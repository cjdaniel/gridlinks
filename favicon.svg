<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <filter id="red-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sq"><rect x="0" y="0" width="280" height="280" rx="40"/></clipPath>
  </defs>

  <g clip-path="url(#sq)">

    <!-- Base -->
    <rect x="0" y="0" width="280" height="280" fill="#1a1f2e"/>

    <!-- 3x3 blocks: street width=14, cell=74, streets at 0,88,176,266 (using rects) -->
    <!-- Block positions: 14, 102, 190 (x and y) -->

    <!-- Row 1 -->
    <rect x="14"  y="14"  width="74" height="74" rx="6" fill="#2e3a70"/>
    <rect x="102" y="14"  width="74" height="74" rx="6" fill="#324075"/>
    <rect x="190" y="14"  width="74" height="74" rx="6" fill="#1e4820"/>

    <!-- Row 2 -->
    <rect x="14"  y="102" width="74" height="74" rx="6" fill="#224a28"/>
    <rect x="102" y="102" width="74" height="74" rx="6" fill="#1e4820"/>
    <rect x="190" y="102" width="74" height="74" rx="6" fill="#2e3a70"/>

    <!-- Row 3 -->
    <rect x="14"  y="190" width="74" height="74" rx="6" fill="#263870"/>
    <rect x="102" y="190" width="74" height="74" rx="6" fill="#224a28"/>
    <rect x="190" y="190" width="74" height="74" rx="6" fill="#324075"/>

    <!-- Streets (vertical) -->
    <rect x="0"   y="0" width="14" height="280" fill="#4a5280"/>
    <rect x="88"  y="0" width="14" height="280" fill="#4a5280"/>
    <rect x="176" y="0" width="14" height="280" fill="#4a5280"/>
    <rect x="266" y="0" width="14" height="280" fill="#4a5280"/>

    <!-- Streets (horizontal) -->
    <rect x="0" y="0"   width="280" height="14" fill="#4a5280"/>
    <rect x="0" y="88"  width="280" height="14" fill="#4a5280"/>
    <rect x="0" y="176" width="280" height="14" fill="#4a5280"/>
    <rect x="0" y="266" width="280" height="14" fill="#4a5280"/>

    <!-- Windows -->
    <rect x="22"  y="22"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.95"/>
    <rect x="40"  y="22"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.6"/>
    <rect x="22"  y="37"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.75"/>
    <rect x="110" y="22"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.9"/>
    <rect x="128" y="37"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.6"/>
    <rect x="198" y="22"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.8"/>
    <rect x="216" y="22"  width="12" height="9" rx="2" fill="#ffe566" opacity="0.95"/>
    <rect x="22"  y="110" width="12" height="9" rx="2" fill="#ffe566" opacity="0.7"/>
    <rect x="40"  y="128" width="12" height="9" rx="2" fill="#ffe566" opacity="0.9"/>
    <rect x="110" y="110" width="12" height="9" rx="2" fill="#ffe566" opacity="0.6"/>
    <rect x="198" y="128" width="12" height="9" rx="2" fill="#ffe566" opacity="0.85"/>
    <rect x="216" y="110" width="12" height="9" rx="2" fill="#ffe566" opacity="0.7"/>
    <rect x="22"  y="198" width="12" height="9" rx="2" fill="#ffe566" opacity="0.95"/>
    <rect x="110" y="216" width="12" height="9" rx="2" fill="#ffe566" opacity="0.8"/>
    <rect x="198" y="198" width="12" height="9" rx="2" fill="#ffe566" opacity="0.9"/>
    <rect x="216" y="216" width="12" height="9" rx="2" fill="#ffe566" opacity="0.6"/>

    <!-- Red crossing street at y=88 -->
    <rect x="0" y="88" width="280" height="14" fill="#FF3B30" filter="url(#red-glow)" opacity="0.6"/>
    <rect x="0" y="88" width="280" height="14" fill="#FF3B30"/>

    <!-- Freeway diagonal: top-right to bottom-left -->
    <line x1="280" y1="0" x2="0" y2="280" stroke="#e0e8f8" stroke-width="10"/>

    <!-- Crossing dot: line x+y=280 meets y=95 (street center) → x=185 -->
    <circle cx="185" cy="95" r="18" fill="#FF3B30" filter="url(#red-glow)"/>
    <circle cx="185" cy="95" r="18" fill="#FF3B30"/>

  </g>

  <rect x="0" y="0" width="280" height="280" rx="40" fill="none" stroke="#ffffff25" stroke-width="2"/>
</svg>
